<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lomerezco.cl</title>

<style>
:root{
--bg:#0b0603;
--card:#1c0f07;
--gold:#ffd166;
--accent:#ff5a3c;
--green:#2ecc71;
--text:#fff3e0;
}

body{margin:0;background:radial-gradient(circle,#1a0f08,#0b0603);color:var(--text);font-family:sans-serif;text-align:center}

canvas{margin-top:20px}

.spin-btn{
margin-top:20px;
padding:14px 28px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#ff5a3c,#ff7b00);
color:#fff;
font-weight:bold;
box-shadow:0 4px 0 #7a1f0f;
}

.result{
margin-top:20px;
padding:15px;
border-radius:14px;
display:none;
}

</style>
</head>
<body>

<h2>🎡 Antes de comprar...</h2>
<canvas id="wheel" width="300" height="300"></canvas>
<br>
<button class="spin-btn" onclick="spin()">GIRAR</button>
<div id="result" class="result"></div>

<script>

const frases = [
"ESPERA",
"NO ES NECESARIO",
"PIÉNSALO",
"RESPIRA",
"AHORRA",
"NO COMPRES",
"DISFRUTA",
"TE LO MERECES",
"HOY NO",
"DECIDE BIEN"
];

const colores = [
"#e74c3c","#27ae60","#2980b9","#8e44ad","#16a085",
"#d35400","#2ecc71","#c0392b","#1abc9c","#34495e"
];

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
let angle = 0;

function drawWheel(){
const size = canvas.width/2;
const arc = (2*Math.PI)/frases.length;

ctx.clearRect(0,0,300,300);
ctx.save();
ctx.translate(size,size);
ctx.rotate(angle);

for(let i=0;i<frases.length;i++){
ctx.beginPath();
ctx.moveTo(0,0);
ctx.arc(0,0,size,i*arc,(i+1)*arc);
ctx.fillStyle = colores[i];
ctx.fill();

ctx.save();
ctx.rotate(i*arc + arc/2);
ctx.fillStyle="#fff";
ctx.font="bold 12px sans-serif";
ctx.textAlign="center";
ctx.fillText(frases[i], size*0.65,0);
ctx.restore();
}

ctx.restore();
}

function vibrar(ms){
if(navigator.vibrate) navigator.vibrate(ms);
}

function spin(){
vibrar(40);
let spins = 5 + Math.random()*3;
let final = Math.random()*Math.PI*2;
let duration = 3000;
let start = null;

function animate(t){
if(!start) start = t;
let progress = (t-start)/duration;

if(progress<1){
let ease = 1 - Math.pow(1-progress,3);
angle = spins*2*Math.PI*ease + final*ease;
drawWheel();
requestAnimationFrame(animate);
}else{
angle = final;
drawWheel();
showResult();
}
}

requestAnimationFrame(animate);
}

function showResult(){
vibrar(80);
const arc = (2*Math.PI)/frases.length;
let index = Math.floor(((2*Math.PI - angle%(2*Math.PI)) / arc)) % frases.length;

const res = document.getElementById("result");

if(index < 6){
res.style.background = "#145a32";
res.innerHTML = "💪 " + frases[index] + "<br><small>Decisión inteligente</small>";
}else{
res.style.background = "#7b0000";
res.innerHTML = "🛍️ " + frases[index] + "<br><small>Hazlo consciente</small>";
}

res.style.display = "block";
}


drawWheel();

</script>

</body>
</html>
